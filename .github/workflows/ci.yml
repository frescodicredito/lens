name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Byte-compile sources
        run: uv run python -m py_compile server.py constraints/composer.py meta/analytics.py output/formatter.py integrations/miner.py

      - name: Data-graph integrity tests
        run: uv run python tests/test_integrity.py

      - name: Security regression tests
        run: uv run python tests/test_security.py

      - name: Server smoke test (import + tools)
        run: uv run python tests/test_server.py

      - name: Quickstart smoke test
        run: uv run python examples/quickstart.py

      - name: Reference docs are in sync
        shell: bash
        run: |
          uv run python scripts/gen_docs.py
          if ! git diff --quiet -- docs/; then
            echo "::error::docs/ is out of date. Run 'python scripts/gen_docs.py' and commit the result."
            git diff -- docs/
            exit 1
          fi

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Lint with ruff (real-bug rules)
        run: uvx ruff check --select=F,E9 server.py constraints meta output integrations scripts examples tests

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Audit dependencies for known vulnerabilities
        run: uv run --with pip-audit pip-audit
